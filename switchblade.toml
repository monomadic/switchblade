# Switchblade hot-tuning config (PLAN.md §10).
# Edit while the app is running — it reloads within ~250ms. Every feel
# constant lives here; if you find yourself hardcoding one, add it instead.

[tuning]
# Ideal tile size: width picks the column count, then tiles stretch so the
# columns exactly fill the window (the background should barely show).
# Width:height sets the aspect ratio (240:135 = 16:9).
tile_width = 240.0
tile_height = 135.0
gap = 2.0

# Scroll delta multiplier; negative flips direction if pan feels inverted.
pan_sensitivity = 1.0
# Extra inertia (0 = off). macOS trackpads already send momentum events,
# so leave at 0 there or flicks will double-glide.
pan_inertia = 0.0

# 0..1 fractions covered per frame at 60fps (higher = snappier).
snap_strength = 0.22       # trackpad pan chase
key_snap_strength = 0.12   # keyboard move chase — lower = gentler glide
rubber_band = 0.25
scale_smoothing = 0.35
zoom_smoothing = 0.35

# Pinch-to-zoom (also -/=/0 keys). Zoom scales the ideal tile width,
# so columns reflow; the reflow crossfades over zoom_fade_ms.
pinch_sensitivity = 1.0
zoom_min = 0.35
zoom_max = 3.0
zoom_fade_ms = 180.0

# Selected tile scales up and overlaps neighbors; the boost exponent makes
# it stand out even more as you zoom out (0 = off).
selection_scale = 1.15
selection_zoom_boost = 0.35
hover_scale = 1.06

corner_radius = 5.0
selection_corner_radius = 10.0
border_width = 6.0
fade_in_ms = 220.0

# Live video inside the selected/hovered tiles, starting after the
# target settles for live_delay_ms (so flying across the grid doesn't
# spawn a decoder per keypress). Quickview plays regardless — this only
# controls the passive in-tile playback.
live_preview = true
live_delay_ms = 100.0

# Pause live playback + sheet animation while the window is unfocused
# (the grid stays visible, just still — big CPU saver). Toggle at
# runtime with 'p'.
pause_unfocused = true

# ── Media quality (read at startup — restart to apply) ─────────────────
# Thumb size doubles as the atlas slot size, so resolution trades against
# slot count: 640x360 -> 144 slots, 960x540 -> 64. thumb_quality is
# ffmpeg -q:v (2 = near lossless … 31 = worst); 5 is a good
# size/speed/quality balance. Changing any of these regenerates
# thumbnails (cache files are named by recipe).
thumb_width = 640
thumb_height = 360
thumb_quality = 5
# Anim sheet grid: frames = grid², frame size = thumb/grid.
# 3 = 9 smaller frames (more motion), 2 = 4 crisper frames.
anim_grid = 3
atlas_width = 7680
atlas_height = 4320
# Quickview decodes at up to this size (never above the source's own
# resolution). Higher = sharper modal, more decode CPU while it's open.
quickview_max_width = 1920
quickview_max_height = 1080

# Animated thumbnails (sprite sheets, 9 frames sampled across each clip).
# One full cycle takes anim_cycle_s; frames crossfade into each other for
# anim_crossfade of each interval (0 = hard cuts). Tiles narrower than
# anim_min_tile_w stay static. Toggle live with 'a' or start --no-anim.
anim = false
anim_cycle_s = 10.8
anim_crossfade = 1.0
anim_min_tile_w = 140.0

# Aspect cap (long:short) for the selected/hovered tile. Clips beyond it
# get pan-and-scan cropped: portrait loses top/bottom, ultrawide loses
# sides. 1.5 also gently crops 16:9; set 1.78 to leave landscape untouched.
max_display_aspect = 1.5
selection_border = [0.0, 0.0, 0.0]
hover_border = [1.0, 1.0, 1.0]
# Thin outline for tiles that have no thumbnail yet (fill is transparent).
empty_border = [0.10, 0.10, 0.13]
background = [0.004, 0.004, 0.006]

# ── Keys & commands (PLAN.md §11) ────────────────────────────────────────
# Built-in defaults: enter/o = open (mpv) · space = preview (looping mpv)
# · c = copy_path · q = quit · f = fullscreen · -/=/0 = zoom.
# hjkl/arrows are reserved for movement. Entries here override defaults.
# {path}, {dir}, {name} expand against the selected clip.
# Built-in internal actions: quit, fullscreen, copy_path,
# zoom_in, zoom_out, zoom_reset.

[keys]
enter = "open"
o = "open"
space = "quickview"   # internal preview; Esc or Space closes, arrows browse
# space = "preview"   # alternative: external looping mpv
c = "copy_path"
a = "toggle_anim"       # background tile animation on/off
p = "toggle_focus_pause" # pause-when-unfocused on/off
r = "reveal"            # reveal in Finder (open -R)
# n = "rename_script"   # any key -> any external command; see below

# "open" is just a command like any other — swap mpv for whatever you
# like, or add more commands and bind keys to them.
[commands.open]
type = "external"
program = "mpv"
args = ["{path}"]

# Quick-Look-ish peek: windowed (never fullscreen), floats on top,
# loops, opens instantly, capped at 70% of the screen.
[commands.preview]
type = "external"
program = "mpv"
args = [
  "--no-fs",
  "--loop-file=inf",
  "--ontop",
  "--no-terminal",
  "--force-window=immediate",
  "--autofit-larger=70%x70%",
  "{path}",
]

# Built-in default, shown for reference — override to change it:
# [commands.reveal]
# type = "external"
# program = "open"
# args = ["-R", "{path}"]

# [commands.rename_script]
# type = "external"
# program = "~/bin/rename-media"
# args = ["{path}"]
