# Whole corpus ingested.
[[step]]
action = "wait_until"
cond = "library_count"
n = 60
timeout = 30.0

# The selected (index 0) clip's static thumb must land first — the anim
# request gates on Thumb::Ready. Realistic: the user was in the grid with
# the thumb already loaded before opening fullview.
[[step]]
action = "wait_until"
cond = "cache_thumbs"
n = 1
timeout = 30.0

# Settle a beat; the selected stream warms in the grid.
[[step]]
action = "wait"
secs = 0.5

# Enter fullview on the default-selected 4K clip (Tab = Fullview).
[[step]]
action = "key"
key = "tab"

# Watched stream first frame.
[[step]]
action = "wait_until"
cond = "selected_served"
timeout = 25.0

# Gate cascade opened: request_quickview_sheet fired.
[[step]]
action = "wait_until"
cond = "selected_anim_requested"
timeout = 120.0

# Chips renderable: sheet decoded + atlas-resident.
[[step]]
action = "wait_until"
cond = "selected_anim"
timeout = 120.0

[validity]
require = ["library_count", "selected_served"]
