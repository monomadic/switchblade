name = "chapter_sheet_fullview"

# Prose intent — read retrospectively, never parsed.
intent = """
Reproduce and quantify the "chapter-bar chips take up to a minute to appear
after opening fullview" report. The watched clip (index 0) is a heavy 4K/60
HEVC source — the same profile as the user's real library — followed by many
more 4K clips so the background thumb-gen sweep keeps all workers busy, the
real-world condition when fullview is opened on a freshly ingested library.

The chapter chips sample the SELECTED clip's anim sheet (storyboard). That
sheet is requested on fullview entry by request_quickview_sheet, behind the
prewarm_ok + warm_filling gates, then generated by make_anim (nine seeked
ffmpeg extracts) on one worker while the sweep contends on the others.

Decomposition (why two anim conditions):
  selected_served         -> the watched stream's first frame is up
  selected_anim_requested -> request_quickview_sheet fired (gates opened)
  selected_anim           -> sheet decoded AND atlas-resident = chips can draw

  requested - served  = the gate-cascade cost (prewarm_ok / warm_filling /
                        waiting on the static thumb)
  ready - requested   = worker-queue wait + make_anim gen + install cost

Expected (the bug): ready - served is large (seconds to ~a minute). Whichever
sub-interval dominates points at the real fix — a gate that won't open vs.
generation/queue starvation. Reproduces on a LOCAL SSD (user-confirmed), so
this is NOT primarily the taskpolicy -b disk band.

Fidelity: Tier A, no GPU. Atlas install still runs (headless upload path), so
selected_anim reflects the real Ready transition the chips gate on.
"""

[setup]
animation = "normal"
viewport = [1280, 800]
refresh_hz = 60.0
max_wall_s = 150.0
inputs = [
    "benchmarks/fixtures/corpus/sweep_01_hevc_2160p60.mp4",
    "benchmarks/fixtures/corpus/sweep_02_hevc_2160p60.mp4",
